<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍜 หารกัน - ค่าอาหาร</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="food-icon.png?v=1" type="image/png">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div class="container">
        <h1>🍜 หารค่าอาหาร</h1>
        
        <div class="card">
            <h3>🛵 ค่าใช้จ่ายส่วนกลาง</h3>
            <div class="input-row">
                <div class="input-group">
                    <label>ค่าส่ง (บาท)</label>
                    <input type="number" id="deliveryFee" value="0">
                </div>
                <div class="input-group">
                    <label>ส่วนลดรวม (บาท)</label>
                    <input type="number" id="discount" value="0">
                </div>
            </div>
        </div>

        <div class="card">
            <h3>💳 ข้อมูลคนรับเงิน (สร้าง QR)</h3>
            <div class="input-group">
                <label>เบอร์พร้อมเพย์ (ใส่เพื่อสร้าง QR Code)</label>
                <input type="text" id="promptpay" placeholder="เช่น 0812345678">
            </div>
            <div class="input-group">
                <label>ชื่อบัญชี</label>
                <input type="text" id="receiverName" placeholder="เช่น แม็ก">
            </div>
        </div>

        <div class="card">
            <h3>👥 รายการอาหารแต่ละคน</h3>
            <div id="playersList"></div>
            <button class="btn-add" onclick="addPlayer()">+ เพิ่มคนกิน</button>
        </div>

        <button class="btn-calc" onclick="calculate()">🧮 คำนวณยอด</button>

        <div id="resultSection" class="hidden">
            <h3>📊 สรุปยอดโอน</h3>
            <div class="table-responsive">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>ชื่อ</th>
                            <th>ค่าอาหาร</th>
                            <th>(+ส่ง/-ลด)</th>
                            <th>ยอดโอน</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="qr-section hidden" id="qrContainer">
                <p>สแกนจ่ายยอดรวม <span id="qrAmountText"></span> บ.</p>
                <img id="qrImage" src="" alt="PromptPay QR">
            </div>

            <button class="btn-line hidden" id="btnSendLine" onclick="sendToLine()">🟢 ส่งสรุปเข้าแชทกลุ่ม</button>
            <button class="btn-copy" onclick="copyText()">📋 ก๊อปปี้ข้อความ</button>
            <textarea id="summaryText" rows="6" readonly></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
